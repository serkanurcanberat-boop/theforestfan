<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREST HUB | Live Cloud</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        /* Dünkü Lüks CSS Ayarları Aynen Korundu */
        :root {
            --primary: #00ff41;
            --primary-glow: rgba(0, 255, 65, 0.3);
            --bg: #000000;
            --surface: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body.red-mode { --primary: #ff0000; --primary-glow: rgba(255, 0, 0, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; }

        /* NAVBAR */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }

        .brand { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem; }
        .brand span { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }

        /* BUTONLAR */
        .btn-main {
            padding: 12px 25px; background: var(--primary); color: #000;
            border: none; border-radius: 10px; font-weight: 800; cursor: pointer;
            font-family: 'Orbitron'; transition: var(--transition);
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--primary-glow); }

        /* HABER KARTLARI (DİNAMİK) */
        .container { max-width: 1200px; margin: 120px auto 50px; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .news-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 30px; border-radius: 20px; transition: var(--transition);
        }
        .news-card:hover { transform: scale(1.03); border-color: var(--primary); box-shadow: 0 0 30px var(--primary-glow); }

        /* YORUM ALANI */
        .community-section { max-width: 800px; margin: 50px auto; padding: 30px; background: #050505; border-radius: 20px; border: 1px solid var(--border); }
        .comment { padding: 15px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
        .comment strong { color: var(--primary); font-size: 0.9rem; }
        .comment p { font-size: 0.95rem; opacity: 0.8; }

        /* AUTH MODAL */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal.active { display: flex; }
        .auth-form { background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--primary); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }
    </style>
</head>
<body id="body">

    <nav>
        <div class="brand">FOREST<span>HUB</span></div>
        <div id="userSection">
            <button class="btn-main" onclick="toggleAuth()">GİRİŞ / KAYIT</button>
        </div>
    </nav>

    <div class="container">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 15px;">CANLI HABER AKIŞI</h2>
        <div class="news-grid" id="newsGrid">
            </div>
    </div>

    <div class="community-section">
        <h3 style="font-family: 'Orbitron'; margin-bottom: 20px;">TOPLULUK SESİ</h3>
        <div id="commentList">
            </div>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <input type="text" id="commentInput" placeholder="Mesajını yaz..." style="margin-bottom: 0;">
            <button class="btn-main" onclick="sendComment()">GÖNDER</button>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="auth-form">
            <h2 id="authTitle" style="color: var(--primary); margin-bottom: 20px;">GİRİŞ YAP</h2>
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button class="btn-main" style="width: 100%;" onclick="handleAuth()">DEVAM ET</button>
            <p onclick="toggleAuth()" style="margin-top: 15px; font-size: 12px; cursor: pointer; opacity: 0.5;">Kapat</p>
        </div>
    </div>

    <script>
        // --- SUPABASE BAĞLANTISI ---
        // Senin URL'ni buraya eklemen gerekecek, Key'i ben ekledim.
        const SUPABASE_URL = 'SENİN_SUPABASE_PROJE_URL_BURAYA'; 
        const SUPABASE_KEY = 'sb_publishable_caKncH3gByT_fcUybZV9TQ_J07SkQ-S';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;

        // 1. OTURUM KONTROLÜ
        async function checkUser() {
            const { data } = await supabase.auth.getUser();
            if (data.user) {
                user = data.user;
                document.getElementById('userSection').innerHTML = `
                    <span style="color: var(--primary); font-weight: bold; margin-right: 15px;">${user.email.split('@')[0]}</span>
                    <button class="btn-main" style="background: #222; color: #fff;" onclick="logout()">ÇIKIŞ</button>
                `;
            }
        }

        // 2. KAYIT / GİRİŞ SİSTEMİ
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Hem giriş hem kayıt denemesi (Basitlik için)
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) alert("Hata: " + signUpError.message);
                else alert("Kayıt başarılı! E-postanı onayla.");
            } else {
                location.reload();
            }
        }

        // 3. CANLI YORUMLARI ÇEKME
        async function fetchComments() {
            const { data, error } = await supabase
                .from('comments')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (data) {
                const list = document.getElementById('commentList');
                list.innerHTML = data.map(c => `
                    <div class="comment">
                        <strong>${c.username}</strong>
                        <p>${c.content}</p>
                    </div>
                `).join('');
            }
        }

        // 4. YORUM GÖNDERME
        async function sendComment() {
            if (!user) return alert("Önce giriş yapmalısın!");
            const content = document.getElementById('commentInput').value;
            if (!content) return;

            const { error } = await supabase
                .from('comments')
                .insert([{ 
                    content: content, 
                    username: user.email.split('@')[0],
                    user_id: user.id 
                }]);

            if (!error) {
                document.getElementById('commentInput').value = "";
                fetchComments();
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        function toggleAuth() { document.getElementById('authModal').classList.toggle('active'); }

        // Başlangıç
        checkUser();
        fetchComments();
        // Haberler kısmını da benzer bir fetchNews fonksiyonu ile doldurabiliriz.
    </script>
</body>
</html>
