<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREST HUB | Interactive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4eff4e;
            --bg: #020402;
            --card-bg: rgba(15, 20, 15, 0.9);
            --border: rgba(78, 255, 78, 0.15);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* NAVBAR */
        nav {
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        .brand { font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--primary); font-size: 1.5rem; }

        /* ADMIN PANEL - GİZLİ */
        #adminPanel {
            display: none; background: #0a110a; border: 1px dashed var(--primary);
            padding: 20px; margin: 20px 5%; border-radius: 15px;
        }

        .input-field {
            width: 100%; padding: 12px; margin: 10px 0; background: #000;
            border: 1px solid var(--border); color: #fff; border-radius: 8px;
        }

        /* HABER KARTLARI */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .news-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 30px; border-radius: 20px; margin-bottom: 25px;
            transition: var(--transition);
        }

        .news-card:hover { border-color: var(--primary); box-shadow: 0 10px 30px rgba(78, 255, 78, 0.1); }

        .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* ETKİLEŞİM BUTONLARI */
        .actions { display: flex; gap: 20px; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .action-btn {
            background: transparent; border: none; color: #888; cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-weight: bold; transition: 0.2s;
        }
        .action-btn:hover { color: var(--primary); }
        .action-btn.liked { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* BUTONLAR */
        .btn-pro {
            background: var(--primary); color: #000; border: none;
            padding: 10px 25px; border-radius: 8px; font-weight: 900;
            cursor: pointer; font-family: 'Orbitron';
        }

        /* YORUM ALANI */
        .comment-section { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; display: none; }
        .comment-section.active { display: block; }
        
        .comment { font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #bbb; }
        .comment strong { color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <div class="brand">FOREST<span>TR</span></div>
    <div id="authZone">
        <button class="btn-pro" onclick="fakeLogin()">GİRİŞ YAP</button>
    </div>
</nav>

<div id="adminPanel">
    <h3 style="color:var(--primary); font-family:'Orbitron';">ADMİN HABER MERKEZİ</h3>
    <input type="text" id="newsTitle" class="input-field" placeholder="Haber Başlığı...">
    <textarea id="newsContent" class="input-field" rows="3" placeholder="Haber İçeriği..."></textarea>
    <button class="btn-pro" onclick="postNews()">YAYINLA</button>
</div>

<div class="container" id="newsFeed">
    </div>

<script>
    // --- 1. VERİ YAPISI ---
    let newsData = JSON.parse(localStorage.getItem('forest_news')) || [
        {
            id: 1,
            author: "insanazor",
            title: "SOTF: Yeni Güncelleme Notları",
            content: "v1.0 ile gelen yeni mutantlar adayı çok daha tehlikeli hale getirdi. Hazır mısınız?",
            likes: 42,
            comments: [{user: "Killoki", text: "Sonunda geldi be!"}]
        }
    ];

    let currentUser = localStorage.getItem('forest_user') || null;

    // --- 2. GİRİŞ SİMÜLASYONU ---
    function fakeLogin() {
        let user = prompt("Kullanıcı Adı Gir (Admin için: insanazor)");
        if(user) {
            localStorage.setItem('forest_user', user);
            location.reload();
        }
    }

    // --- 3. HABER YAYINLAMA (Sadece Admin) ---
    function postNews() {
        const title = document.getElementById('newsTitle').value;
        const content = document.getElementById('newsContent').value;

        if(!title || !content) return alert("Boş bırakma!");

        const newPost = {
            id: Date.now(),
            author: currentUser,
            title: title,
            content: content,
            likes: 0,
            comments: []
        };

        newsData.unshift(newPost);
        localStorage.setItem('forest_news', JSON.stringify(newsData));
        renderNews();
        
        document.getElementById('newsTitle').value = "";
        document.getElementById('newsContent').value = "";
    }

    // --- 4. BEĞENİ & YORUM FONKSİYONLARI ---
    function likePost(id) {
        if(!currentUser) return alert("Önce giriş yapmalısın!");
        const post = newsData.find(p => p.id === id);
        post.likes++;
        localStorage.setItem('forest_news', JSON.stringify(newsData));
        renderNews();
    }

    function toggleComments(id) {
        const el = document.getElementById(`comments-${id}`);
        el.classList.toggle('active');
    }

    function addComment(id) {
        if(!currentUser) return alert("Önce giriş yapmalısın!");
        const text = prompt("Yorumun nedir?");
        if(text) {
            const post = newsData.find(p => p.id === id);
            post.comments.push({user: currentUser, text: text});
            localStorage.setItem('forest_news', JSON.stringify(newsData));
            renderNews();
        }
    }

    // --- 5. ARAYÜZÜ ÇİZDİRME ---
    function renderNews() {
        const feed = document.getElementById('newsFeed');
        feed.innerHTML = "";

        newsData.forEach(post => {
            feed.innerHTML += `
                <div class="news-card">
                    <div class="news-header">
                        <span style="color:var(--primary); font-weight:900;">@${post.author}</span>
                        <small style="color:#555;">ID: #${post.id.toString().slice(-4)}</small>
                    </div>
                    <h2>${post.title}</h2>
                    <p style="color:#aaa;">${post.content}</p>
                    
                    <div class="actions">
                        <button class="action-btn" onclick="likePost(${post.id})">
                            🔥 <span>${post.likes}</span>
                        </button>
                        <button class="action-btn" onclick="toggleComments(${post.id})">
                            💬 <span>${post.comments.length} Yorum</span>
                        </button>
                        <button class="action-btn" onclick="addComment(${post.id})">
                            ➕ Yorum Ekle
                        </button>
                    </div>

                    <div class="comment-section" id="comments-${post.id}">
                        ${post.comments.map(c => `
                            <div class="comment"><strong>${c.user}:</strong> ${c.text}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    }

    // --- 6. SAYFA BAŞLANGIÇ AYARLARI ---
    window.onload = () => {
        if(currentUser) {
            document.getElementById('authZone').innerHTML = `<span style="color:var(--primary)">HOS GELDIN, <strong>${currentUser.toUpperCase()}</strong></span>`;
            
            // Eğer admin sensen panel açılır
            if(currentUser === "insanazor") {
                document.getElementById('adminPanel').style.display = "block";
            }
        }
        renderNews();
    };
</script>

</body>
</html>
